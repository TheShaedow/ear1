<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gehörtraining – Intervalle hören</title>
  <style>
    :root{
      --bg1:#111827; --bg2:#312e81; --card:rgba(255,255,255,.92); --ink:#14213d;
      --muted:#64748b; --brand:#7c3aed; --brand2:#06b6d4; --good:#10b981; --bad:#ef4444;
      --gold:#f59e0b; --shadow:0 28px 80px rgba(15,23,42,.28); --radius:30px;
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink)}
    body{background:radial-gradient(circle at 10% 10%,#38bdf8 0 16%,transparent 34%),radial-gradient(circle at 90% 0,#f472b6 0 13%,transparent 32%),linear-gradient(135deg,var(--bg1),var(--bg2));padding:22px;overflow-x:hidden}
    .app{max-width:1180px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px;color:white}.logo{display:flex;align-items:center;gap:12px;font-weight:900;font-size:clamp(22px,3vw,34px)}
    .logo .mark{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#fff,#c7d2fe);display:grid;place-items:center;color:#4f46e5;box-shadow:0 12px 30px rgba(0,0,0,.22)}
    .scorebar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.pill{background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(12px);color:white;border-radius:999px;padding:10px 14px;font-weight:800}.pill b{color:#fde68a}
    .hero{background:var(--card);border:1px solid rgba(255,255,255,.55);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:370px 1fr}.side{padding:28px;background:linear-gradient(180deg,rgba(124,58,237,.1),rgba(6,182,212,.08))}.main{padding:28px;position:relative}
    h1{font-size:clamp(30px,5vw,56px);line-height:.95;margin:0 0 12px}.lead{font-size:18px;color:var(--muted);margin:0 0 22px}.settings{display:grid;gap:14px}.field{background:white;border-radius:20px;padding:14px 16px;box-shadow:0 10px 24px rgba(15,23,42,.08)}label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:900;display:block;margin-bottom:7px}.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}select,input[type=range]{width:100%;accent-color:var(--brand)}select{appearance:none;border:0;background:#f1f5f9;border-radius:14px;padding:12px;font-size:16px;font-weight:800;color:#1e293b}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;align-items:center;gap:7px;background:#f8fafc;border-radius:12px;padding:9px;font-weight:800}.check input{accent-color:var(--brand)}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0}.btn{border:0;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 12px 22px rgba(15,23,42,.12);transition:.18s transform,.18s filter}.btn:hover{transform:translateY(-2px)}.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:white}.secondary{background:white;color:#312e81}.ghost{background:#eef2ff;color:#4338ca}.tiny{padding:9px 12px;border-radius:13px;font-size:14px}
    .stage{display:grid;place-items:center;min-height:535px}.wheel{position:relative;width:min(72vw,540px);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#fff 0 32%,#eef2ff 33% 48%,#dbeafe 49% 50%,transparent 51%);display:grid;place-items:center}.center{width:42%;aspect-ratio:1;border-radius:50%;background:linear-gradient(135deg,#fff,#f8fafc);box-shadow:inset 0 0 0 1px #e2e8f0,0 22px 45px rgba(15,23,42,.14);display:grid;place-items:center;text-align:center;padding:18px;z-index:2}.note{font-size:44px;font-weight:1000}.sub{font-weight:900;color:#64748b}.choice{position:absolute;left:50%;top:50%;width:94px;height:94px;margin:-47px;border:0;border-radius:28px;background:white;color:#312e81;font-weight:1000;font-size:14px;box-shadow:0 16px 32px rgba(15,23,42,.17);cursor:pointer;transition:.18s}.choice:hover{transform:var(--pos) scale(1.08)!important;background:#fef3c7}.choice.good{background:#dcfce7;color:#047857}.choice.bad{background:#fee2e2;color:#b91c1c;animation:shake .33s}.choice.reveal{outline:5px solid #f59e0b}.feedback{min-height:44px;text-align:center;font-size:25px;font-weight:1000;margin-top:4px}.feedback.good{color:var(--good)}.feedback.bad{color:var(--bad)}@keyframes shake{25%{translate:-5px 0}50%{translate:5px 0}75%{translate:-4px 0}}
    .piano{height:120px;background:#111827;border-radius:24px;padding:12px;display:flex;position:relative;margin-top:18px;box-shadow:inset 0 -8px 18px rgba(0,0,0,.25)}.key{flex:1;border:1px solid #cbd5e1;background:linear-gradient(#fff,#e5e7eb);border-radius:0 0 10px 10px;position:relative}.key.on{background:linear-gradient(#fde68a,#fff7ed)}.key.black{position:absolute;width:5.5%;height:62%;background:linear-gradient(#1f2937,#030712);border:0;border-radius:0 0 9px 9px;z-index:3;top:12px}.foot{color:rgba(255,255,255,.75);text-align:center;margin:14px;font-size:13px}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.bit{position:absolute;width:10px;height:18px;border-radius:4px;background:#fde047;animation:fall 900ms ease-out forwards}@keyframes fall{to{transform:translateY(120vh) rotate(540deg);opacity:0}}
    @media(max-width:900px){body{padding:12px}.hero{grid-template-columns:1fr}.side,.main{padding:18px}.stage{min-height:500px}.wheel{width:min(96vw,500px)}.choice{width:78px;height:78px;margin:-39px;font-size:12px;border-radius:23px}.top{align-items:flex-start;flex-direction:column}.scorebar{justify-content:flex-start}.piano{height:92px}.checks{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top"><div class="logo"><div class="mark">🎧</div><div>Gehörtraining<br><small style="font-size:14px;opacity:.78">Intervalle hören mit Piano-Sound</small></div></div><div class="scorebar"><div class="pill">Punkte <b id="score">0</b></div><div class="pill">Serie <b id="streak">0</b></div><div class="pill">Quote <b id="rate">–</b></div></div></header>
    <section class="hero">
      <aside class="side"><h1>Intervalle hören</h1><p class="lead">Wähle einen Startton, höre den Sprung und tippe auf das richtige Intervall im Kreis.</p>
        <div class="settings">
          <div class="field"><label>Startton</label><select id="start"></select></div>
          <div class="field"><label>Richtung</label><select id="direction"><option value="up">aufwärts</option><option value="down">abwärts</option><option value="mixed">gemischt</option></select></div>
          <div class="field"><label>Klangart</label><select id="mode"><option value="melodic">nacheinander</option><option value="harmonic">gleichzeitig</option><option value="both">erst nacheinander, dann zusammen</option></select></div>
          <div class="field"><label>Schwierigkeit: <span id="levelText">bis Oktave</span></label><input id="level" type="range" min="1" max="5" value="4"></div>
          <div class="field"><label>Intervalle üben</label><div class="checks" id="intervalChecks"></div></div>
        </div>
        <div class="actions"><button class="btn primary" id="newBtn">✨ Neues Intervall</button><button class="btn secondary" id="replayBtn">▶ Noch einmal</button><button class="btn ghost" id="showBtn">👀 Anzeigen</button></div>
      </aside>
      <main class="main"><div class="stage"><div><div class="wheel" id="wheel"><div class="center"><div><div class="note" id="noteIcon">🎹</div><div class="sub" id="centerText">Bereit?</div></div></div></div><div class="feedback" id="feedback">Drücke „Neues Intervall“.</div><div class="piano" id="piano"></div></div></div></main>
    </section>
    <div class="foot">GitHub Pages ready · komplett ohne Server · optimiert für Google Sites</div>
  </div><div class="confetti" id="confetti"></div>
<script>
(() => {
  const noteNames=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const intervals=[['Prime',0],['kleine Sekunde',1],['große Sekunde',2],['kleine Terz',3],['große Terz',4],['Quarte',5],['Tritonus',6],['Quinte',7],['kleine Sexte',8],['große Sexte',9],['kleine Septime',10],['große Septime',11],['Oktave',12],['kleine None',13],['große None',14],['kleine Dezime',15],['große Dezime',16],['Undezime',17]];
  const levelMax=[5,7,9,12,14,17];
  const el=id=>document.getElementById(id); let audio,current=null,score=0,streak=0,total=0,right=0;
  function midiToFreq(m){return 440*Math.pow(2,(m-69)/12)}
  function initAudio(){ if(!audio) audio=new (window.AudioContext||window.webkitAudioContext)(); if(audio.state==='suspended') audio.resume(); }
  function pianoTone(midi, when=0, dur=.95, gain=.22){
    initAudio(); const t=audio.currentTime+when, out=audio.createGain(), comp=audio.createDynamicsCompressor(); out.connect(comp); comp.connect(audio.destination);
    out.gain.setValueAtTime(0.0001,t); out.gain.exponentialRampToValueAtTime(gain,t+.012); out.gain.exponentialRampToValueAtTime(gain*.38,t+.13); out.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    [[1,1],[2,.45],[3,.18],[4,.09],[5,.05]].forEach(([mul,amp],i)=>{ const o=audio.createOscillator(), g=audio.createGain(); o.type=i? 'triangle':'sine'; o.frequency.setValueAtTime(midiToFreq(midi)*mul,t); g.gain.value=amp; o.connect(g); g.connect(out); o.start(t); o.stop(t+dur+.05); });
    const thump=audio.createOscillator(), tg=audio.createGain(); thump.type='sine'; thump.frequency.setValueAtTime(midiToFreq(midi)/2,t); tg.gain.setValueAtTime(.08,t); tg.gain.exponentialRampToValueAtTime(.0001,t+.08); thump.connect(tg); tg.connect(out); thump.start(t); thump.stop(t+.09);
    lightKey(midi, dur*1000);
  }
  function play(){ if(!current) return; const m=el('mode').value; if(m==='harmonic'){pianoTone(current.a,0,1.4,.18);pianoTone(current.b,0,1.4,.18)} else if(m==='both'){pianoTone(current.a,0,.75);pianoTone(current.b,.82,.95);pianoTone(current.a,2,1.2,.16);pianoTone(current.b,2,1.2,.16)} else {pianoTone(current.a,0,.8);pianoTone(current.b,.9,1)} }
  function build(){
    for(let m=48;m<=72;m++){ if(!noteNames[m%12].includes('#')){ const o=document.createElement('option'); o.value=m; o.textContent=noteNames[m%12]+(Math.floor(m/12)-1); if(m===60)o.selected=true; el('start').appendChild(o); }}
    intervals.forEach(([n,s])=>{ const lab=document.createElement('label'); lab.className='check'; lab.innerHTML=`<input type="checkbox" value="${s}" checked> ${n}`; el('intervalChecks').appendChild(lab); });
    drawPiano(); updateWheel();
  }
  function allowed(){ const max=levelMax[+el('level').value]; return [...document.querySelectorAll('#intervalChecks input:checked')].map(x=>+x.value).filter(v=>v<=max); }
  function updateWheel(){ el('levelText').textContent=['bis Quarte','bis Quinte','bis Sexte','bis Oktave','bis None','bis Undezime'][+el('level').value]; const vals=allowed(); el('wheel').querySelectorAll('.choice').forEach(x=>x.remove()); vals.forEach((v,i)=>{ const a=(i/vals.length)*Math.PI*2-Math.PI/2, r=43; const b=document.createElement('button'); b.className='choice'; b.textContent=intervals.find(x=>x[1]===v)[0]; b.dataset.v=v; b.style.setProperty('--pos',`translate(${Math.cos(a)*r}vw,${Math.sin(a)*r}vw)`); b.style.transform=`translate(${Math.cos(a)*210}px,${Math.sin(a)*210}px)`; b.onclick=()=>answer(v,b); el('wheel').appendChild(b); }); }
  function newInterval(){ const vals=allowed(); if(!vals.length){el('feedback').textContent='Bitte mindestens ein Intervall aktivieren.';return} const start=+el('start').value, step=vals[Math.floor(Math.random()*vals.length)]; let dir=el('direction').value; if(dir==='mixed') dir=Math.random()<.5?'up':'down'; current={a:start,b:start+(dir==='up'?step:-step),step,dir}; el('centerText').textContent=noteNames[start%12]+(Math.floor(start/12)-1)+' → ?'; el('feedback').textContent='Hör genau hin …'; document.querySelectorAll('.choice').forEach(b=>b.className='choice'); play(); }
  function answer(v,btn){ if(!current)return; total++; if(v===current.step){right++;score+=10+streak*2;streak++;btn.classList.add('good');el('feedback').className='feedback good';el('feedback').textContent=['Super!','Genau!','Richtig gehört!','Stark!'][Math.floor(Math.random()*4)]; if(streak%3===0) confetti();} else {streak=0;btn.classList.add('bad');document.querySelector(`.choice[data-v="${current.step}"]`)?.classList.add('reveal');el('feedback').className='feedback bad';el('feedback').textContent='Noch nicht. Richtig ist: '+intervals.find(x=>x[1]===current.step)[0];} refreshScore(); }
  function show(){ if(!current)return; document.querySelector(`.choice[data-v="${current.step}"]`)?.classList.add('reveal'); el('feedback').className='feedback'; el('feedback').textContent='Das Intervall ist: '+intervals.find(x=>x[1]===current.step)[0]; }
  function refreshScore(){el('score').textContent=score; el('streak').textContent=streak; el('rate').textContent=total?Math.round(right/total*100)+'%':'–'}
  function drawPiano(){ const p=el('piano'); p.innerHTML=''; let whites=[]; for(let m=48;m<=72;m++)if(!noteNames[m%12].includes('#'))whites.push(m); whites.forEach(m=>{const k=document.createElement('div');k.className='key';k.dataset.m=m;p.appendChild(k)}); const rect=()=>p.getBoundingClientRect(); for(let m=49;m<=71;m++){ if(noteNames[m%12].includes('#')){ const k=document.createElement('div');k.className='key black';k.dataset.m=m; const before=whites.filter(w=>w<m).length; k.style.left=`calc(${before/whites.length*100}% - 2.75%)`; p.appendChild(k);} } }
  function lightKey(m,ms){ const k=document.querySelector(`.key[data-m="${m}"]`); if(k){k.classList.add('on'); setTimeout(()=>k.classList.remove('on'),ms)} }
  function confetti(){ for(let i=0;i<34;i++){ const b=document.createElement('div'); b.className='bit'; b.style.left=Math.random()*100+'%'; b.style.top='-20px'; b.style.background=['#fde047','#38bdf8','#f472b6','#34d399'][i%4]; b.style.animationDelay=Math.random()*180+'ms'; el('confetti').appendChild(b); setTimeout(()=>b.remove(),1200); } }
  el('newBtn').onclick=newInterval; el('replayBtn').onclick=play; el('showBtn').onclick=show; el('level').oninput=updateWheel; el('intervalChecks').onchange=updateWheel; window.addEventListener('resize',updateWheel); build();
})();
</script>
</body>
</html>
